<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us – Just Show Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Same :root, body, h1/h2/h3, text-gradient, glow-pink, glass-card, btn-gradient as above */
    :root {
      --background: 228 45% 7%;
      --foreground: 210 40% 96%;
      --card: 228 40% 10%;
      --primary: 328 100% 60%;
      --secondary: 199 100% 70%;
      --muted: 228 30% 16%;
      --border: 228 30% 20%;
      --neon-pink: 328 100% 60%;
      --ice-blue: 199 100% 70%;
      --navy: 228 45% 7%;
      --navy-mid: 228 40% 12%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }

    .text-gradient {
      background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(280,90%,65%) 50%, hsl(var(--secondary)) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glow-pink {
      box-shadow: 0 0 30px hsl(var(--primary)/0.4), 0 0 60px hsl(var(--primary)/0.2);
    }

    .glass-card {
      background: rgba(228,40%,10%,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid hsl(var(--border));
      border-radius: 1.5rem;
    }

    .btn-gradient {
      background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(280,90%,65%) 50%, hsl(var(--secondary)) 100%);
      transition: all 0.4s;
    }

    .btn-gradient:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 40px hsl(var(--primary)/0.6);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-[hsl(var(--navy-mid))] backdrop-blur-xl z-50 border-b border-[hsl(var(--border))]">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-black text-gradient">Just Show Up</a>
      <div class="space-x-10 text-lg">
        <a href="index.html" class="hover:text-[hsl(var(--primary))] transition">Home</a>
        <a href="about.html" class="hover:text-[hsl(var(--primary))] transition">About</a>
        <a href="reviews.html" class="hover:text-[hsl(var(--primary))] transition">Reviews</a>
        <a href="contact.html" class="hover:text-[hsl(var(--primary))] transition">Contact</a>
      </div>
    </div>
  </nav>

  <main class="pt-32 pb-20">
    <div class="container mx-auto px-6">
      <h1 class="text-6xl md:text-8xl font-black text-center text-gradient mb-16">Get in Touch</h1>

      <div class="glass-card max-w-3xl mx-auto p-12 md:p-16 glow-pink">
        <p class="text-2xl text-gray-200 text-center mb-12">
          Questions, feedback, or just want to say hi? We'd love to hear from you.
        </p>

        <form class="space-y-8">
          <input type="text" placeholder="Your Name" required class="w-full px-6 py-5 bg-[hsl(var(--navy-mid))] border border-white/30 rounded-2xl text-white placeholder-gray-400 focus:border-[hsl(var(--primary))] focus:ring-2 focus:ring-[hsl(var(--primary))/0.3] outline-none">
          <input type="email" placeholder="Email Address" required class="w-full px-6 py-5 bg-[hsl(var(--navy-mid))] border border-white/30 rounded-2xl text-white placeholder-gray-400 focus:border-[hsl(var(--primary))] focus:ring-2 focus:ring-[hsl(var(--primary))/0.3] outline-none">
          <textarea placeholder="Your Message" rows="6" required class="w-full px-6 py-5 bg-[hsl(var(--navy-mid))] border border-white/30 rounded-2xl text-white placeholder-gray-400 focus:border-[hsl(var(--primary))] focus:ring-2 focus:ring-[hsl(var(--primary))/0.3] outline-none resize-none"></textarea>
          <button type="submit" class="btn-gradient w-full py-6 text-2xl font-bold rounded-2xl glow-pink">
            Send Message →
          </button>
        </form>

        <p class="text-xl text-center mt-12 text-gray-300">
          Or email us directly: <span class="text-neon-pink font-semibold">hello@justshowup.app</span>
        </p>
      </div>
    </div>
  </main>

</body>
</html>
