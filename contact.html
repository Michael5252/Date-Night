<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – Just Show Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav><!-- same nav --></nav>

  <section class="section">
    <div class="container">
      <h1>Get in Touch</h1>
      <p style="font-size:1.3rem; max-width:700px; margin:2rem auto;">
        Questions, ideas, or just want to say hi? We'd love to hear from you.
      </p>

      <form style="max-width:600px; margin:0 auto;">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email Address" required>
        <textarea placeholder="Your Message" rows="6" required></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>

      <p style="margin-top:3rem;">Or email us directly: <strong>hello@justshowup.app</strong></p>
    </div>
  </section>

  <footer><!-- footer --></footer>
</body>
</html>
